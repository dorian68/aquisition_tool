services:
  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://optiquant:optiquant@postgres:5432/optiquant
      LOCAL_STORAGE_PATH: /app/storage
      JWT_SECRET_KEY: change-me-for-local-dev
      ALLOW_MOCK_GOOGLE_AUTH: "true"
      N8N_ENABLED: "false"
      CORS_ORIGINS: "*"
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: optiquant
      POSTGRES_PASSWORD: optiquant
      POSTGRES_DB: optiquant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U optiquant -d optiquant"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    profiles: ["storage"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: optiquant
      MINIO_ROOT_PASSWORD: optiquant-local
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
